<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arb Bot Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Arb Bot Dashboard</h1>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Баланс</h3>
                <p id="balance">0 ETH</p>
            </div>
            <div class="stat-card">
                <h3>Прибыль</h3>
                <p id="profit">0 ETH</p>
            </div>
            <div class="stat-card">
                <h3>Сделок</h3>
                <p id="trades">0</p>
            </div>
        </div>

        <div class="opportunities">
            <h2>Арбитражные возможности</h2>
            <div id="opportunities-list"></div>
        </div>

        <div class="logs">
            <h2>Логи</h2>
            <div id="logs-container"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
